{% extends "base.html" %}

{% block title %}Immersion GM{% endblock %}

{% block content %}
<main class="page">
  <h1>GM Page</h1>

  <section>
    <h2>Current State</h2>
    <p><strong>Scene:</strong> <span id="current-scene">None</span></p>
    <p><strong>Music:</strong> <span id="current-music">None</span></p>
    <p><strong>Music Volume:</strong> <span id="current-music-volume">1.0</span></p>
  </section>

  <section>
    <h2>Scenes</h2>
    <div id="scene-list"></div>
  </section>

  <section>
    <h2>Music</h2>
    <div id="music-list"></div>
  </section>

  <section>
    <h2>Ambiences</h2>
    <div id="ambience-list"></div>
  </section>

  <section>
    <h2>Volume Controls</h2>
    <div>
      <label for="volume-music">Music Volume</label>
      <input id="volume-music" type="range" min="0" max="1" step="0.01">
    </div>
    <div>
      <button id="save-volumes" type="button">Save Volumes</button>
    </div>
  </section>

  <section>
    <h2>Fade Durations</h2>
    <div>
      <label for="fade-music">Music Fade</label>
      <input id="fade-music" type="number" min="0" step="0.1">
    </div>
    <div>
      <label for="fade-ambience">Ambience Fade</label>
      <input id="fade-ambience" type="number" min="0" step="0.1">
    </div>
    <div>
      <label for="fade-scene">Scene Fade</label>
      <input id="fade-scene" type="number" min="0" step="0.1">
    </div>
    <div>
      <button id="save-fade-settings" type="button">Save Fade Settings</button>
    </div>
  </section>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/gm.js"></script>
{% endblock %}
