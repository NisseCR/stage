{% extends "base.html" %}

{% block title %}Immersion Display{% endblock %}

{% block content %}
<main class="display-page">
  <div id="scene-stage" class="scene-stage">
    <img id="scene-background" class="scene-background is-hidden" alt="Current scene background">
    <div id="scene-layers" class="scene-layers"></div>
    <div id="scene-fade-overlay" class="scene-fade-overlay"></div>
    <div id="audio-unlock-overlay" class="audio-unlock-overlay">
      <div class="audio-unlock-card">
        <span class="audio-unlock-kicker">Immersion</span>
        <p class="audio-unlock-text">Tap to enable audio</p>
        <div class="audio-unlock-rule"></div>
      </div>
    </div>
  </div>

  <section class="display-debug">
    <h2>Live State</h2>
    <p><strong>Scene:</strong> <span id="display-scene">Waiting...</span></p>
    <p><strong>Music:</strong> <span id="display-music">Waiting...</span></p>
    <pre id="display-state">No state received yet.</pre>
  </section>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/audio.js"></script>
<script src="/static/js/display.js"></script>
{% endblock %}
